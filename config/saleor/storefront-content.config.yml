# Model attribute keys use contentAttribute *names* (Configurator). Saleor assigns slugs
# (see src/lib/content/attribute-slugs.ts) which Paper mappers read at runtime.
models:
  - title: Storefront Chrome
    slug: storefront-chrome
    modelType: "Storefront — Chrome"
    isPublished: true
    attributes:
      Announcement ID: welcome-promo
      Announcement message: "Free shipping on orders over $75"
      Announcement dismissible: true
      Nav all products label: "All"
      Nav view all label: "View all {label}"

  - title: Storefront Products
    slug: storefront-products
    modelType: "Storefront — Products"
    isPublished: true
    attributes:
      Listing title: "All Products"
      Listing description: "Discover our full collection of premium products."
      Breadcrumb home: "Home"
      Breadcrumb products: "Products"

  - title: Storefront Homepage
    slug: storefront-homepage
    modelType: "Storefront — Homepage"
    isPublished: true
    attributes:
      Hero heading: "Discover our collection"
      Hero CTA label: "Shop all"
      Featured heading: "Featured products"
      Featured collection: featured-products
      Featured limit: "8"

  - title: Storefront Cart
    slug: storefront-cart
    modelType: "Storefront — Cart"
    isPublished: true
    attributes:
      Empty title: "Your bag is empty"
      Empty body: "Looks like you haven't added anything to your bag yet."
      Empty CTA label: "Start Shopping"
      Trust free shipping prefix: "Free delivery over"
      Trust returns label: "30-day returns"
      Drawer title: "Your Bag"
      Drawer item count: "{count} items"
      Drawer add for free shipping: "Add {amount} more for free shipping"
      Drawer free shipping qualified: "You qualify for free shipping!"
      Drawer subtotal: "Subtotal"
      Drawer shipping: "Shipping"
      Drawer shipping free: "Free"
      Drawer shipping calculated: "Calculated at checkout"
      Drawer total: "Total"
      Drawer checkout: "Checkout"
      Drawer continue shopping: "Continue Shopping"
      Drawer remove item: "Remove {product}"
      Drawer decrease quantity: "Decrease quantity"
      Drawer increase quantity: "Increase quantity"
      Page title: "Shopping Cart"
      Page quantity: "Qty: {count}"
      Page variant: "Variant: {name}"
      Page your total: "Your Total"
      Page shipping note: "Shipping will be calculated in the next step"
      Page checkout: "Checkout"

  - title: Storefront Checkout
    slug: storefront-checkout
    modelType: "Storefront — Checkout"
    isPublished: true
    attributes:
      Marketing opt-in label: "Email me with news and offers"
      Trust secure checkout: "Secure checkout"
      Trust Stripe processor: "Payments processed by Stripe"
