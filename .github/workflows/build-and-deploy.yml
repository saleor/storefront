name: Build & Deploy Storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build and deploy on Hetzner
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GH_PAT
          command_timeout: 20m
          script: |
            set -e

            REPO_DIR="/opt/storefront"
            REPO_URL="https://${GH_PAT}@github.com/${{ github.repository }}.git"
            IMAGE_NAME="infinitybio-storefront:latest"

            # Clone or pull
            if [ ! -d "$REPO_DIR" ]; then
              echo "==> First deploy — cloning storefront..."
              git clone "$REPO_URL" "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$REPO_DIR"

            # Read build args from server's .env (server owns env vars — never override from GitHub)
            if [ ! -f "$REPO_DIR/.env" ]; then
              echo "FATAL: $REPO_DIR/.env not found. Create it with NEXT_PUBLIC_* vars before deploying."
              exit 1
            fi
            set -a; source "$REPO_DIR/.env"; set +a

            echo "==> Building Docker image..."
            echo "    NEXT_PUBLIC_SALEOR_API_URL=$NEXT_PUBLIC_SALEOR_API_URL"
            echo "    NEXT_PUBLIC_DEFAULT_CHANNEL=$NEXT_PUBLIC_DEFAULT_CHANNEL"
            docker build \
              --build-arg NEXT_PUBLIC_SALEOR_API_URL="$NEXT_PUBLIC_SALEOR_API_URL" \
              --build-arg NEXT_PUBLIC_STOREFRONT_URL="$NEXT_PUBLIC_STOREFRONT_URL" \
              --build-arg NEXT_PUBLIC_DEFAULT_CHANNEL="$NEXT_PUBLIC_DEFAULT_CHANNEL" \
              --network=host \
              -t "$IMAGE_NAME" .

            # Restart storefront via the infra compose
            cd /opt/saleor
            docker compose -f docker-compose.prod.yml --profile frontend --env-file .env.prod up -d --no-deps storefront

            # Cleanup
            docker image prune -f
            echo "==> Storefront deployed!"
