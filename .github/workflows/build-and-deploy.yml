name: Build & Deploy Storefront

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build and deploy on Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            REPO_DIR="/opt/storefront"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            IMAGE_NAME="infinitybio-storefront:latest"

            # Clone or pull
            if [ ! -d "$REPO_DIR" ]; then
              echo "==> First deploy — cloning storefront..."
              git clone "$REPO_URL" "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$REPO_DIR"

            # Build Docker image locally (API is reachable on this server)
            echo "==> Building Docker image..."
            docker build \
              --build-arg NEXT_PUBLIC_SALEOR_API_URL=http://api:8000/graphql/ \
              --build-arg NEXT_PUBLIC_STOREFRONT_URL=${{ vars.NEXT_PUBLIC_STOREFRONT_URL }} \
              --build-arg NEXT_PUBLIC_DEFAULT_CHANNEL=${{ vars.NEXT_PUBLIC_DEFAULT_CHANNEL }} \
              --network=saleor_saleor-backend-tier \
              -t "$IMAGE_NAME" .

            # Restart storefront via the infra compose
            cd /opt/saleor
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps storefront

            # Cleanup
            docker image prune -f
            echo "==> Storefront deployed!"
