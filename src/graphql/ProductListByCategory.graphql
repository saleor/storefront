query ProductListByCategory(
	$slug: String!
	$channel: String!
	$languageCode: LanguageCodeEnum!
	$first: Int
	$after: String
	$sortBy: ProductOrder
	$filter: ProductFilterInput
	$where: ProductWhereInput
) {
	category(slug: $slug) {
		id
		name
		slug
		description
		seoDescription
		seoTitle
		translation(languageCode: $languageCode) {
			name
			description
			seoDescription
			seoTitle
		}
		backgroundImage {
			url
			alt
		}
		products(
			first: $first
			after: $after
			channel: $channel
			sortBy: $sortBy
			filter: $filter
			where: $where
		) {
			edges {
				node {
					...ProductListItem
				}
				cursor
			}
			pageInfo {
				hasNextPage
				hasPreviousPage
				startCursor
				endCursor
			}
			totalCount
		}
	}
}
