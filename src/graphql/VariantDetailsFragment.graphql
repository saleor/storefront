fragment VariantDetails on ProductVariant {
	id
	name
	sku
	quantityAvailable
	translation(languageCode: $languageCode) {
		name
	}
	selectionAttributes: attributes(variantSelection: VARIANT_SELECTION) {
		values {
			name
			slug
			value
			translation(languageCode: $languageCode) {
				name
			}
			file {
				url
			}
		}
		attribute {
			name
			slug
			inputType
			translation(languageCode: $languageCode) {
				name
			}
		}
	}
	nonSelectionAttributes: attributes(variantSelection: NOT_VARIANT_SELECTION) {
		values {
			name
			slug
			value
			translation(languageCode: $languageCode) {
				name
			}
			file {
				url
			}
		}
		attribute {
			name
			slug
			inputType
			translation(languageCode: $languageCode) {
				name
			}
		}
	}
	media {
		url(size: 1024, format: WEBP)
		alt
		type
	}
	pricing {
		price {
			gross {
				currency
				amount
			}
		}
		priceUndiscounted {
			gross {
				currency
				amount
			}
		}
	}
}
