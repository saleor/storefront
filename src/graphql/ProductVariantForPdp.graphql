# Single-variant resolution for deep links (`?variant=` / `?sku=`) — especially
# over-budget / external buy-box strategies that must not hydrate the full matrix.
# Pass exactly one of `$id` or `$sku` (Saleor rejects both / neither).
query ProductVariantForPdp($id: ID, $sku: String, $channel: String!, $languageCode: LanguageCodeEnum!) {
	productVariant(id: $id, sku: $sku, channel: $channel) {
		...VariantDetails
		product {
			id
			slug
		}
	}
}
