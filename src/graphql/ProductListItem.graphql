fragment ProductListItem on Product {
	id
	name
	slug
	created
	translation(languageCode: $languageCode) {
		name
		slug
	}
	pricing {
		priceRange {
			start {
				gross {
					amount
					currency
				}
			}
			stop {
				gross {
					amount
					currency
				}
			}
		}
		priceRangeUndiscounted {
			start {
				gross {
					amount
					currency
				}
			}
			stop {
				gross {
					amount
					currency
				}
			}
		}
	}
	category {
		id
		name
		slug
		translation(languageCode: $languageCode) {
			name
			slug
		}
		backgroundImage {
			url
			alt
		}
	}
	thumbnail(size: 1024, format: WEBP) {
		url
		alt
	}
	# Bestseller merchandising flag — fetch only the boolean by slug (new attribute API).
	# Slugs must match PRODUCT_FLAG_SLUGS in src/lib/catalog/product-flags.ts.
	bestseller: assignedAttribute(slug: "bestseller") {
		... on AssignedBooleanAttribute {
			value
		}
	}
	pulseBestseller: assignedAttribute(slug: "pulse-bestseller") {
		... on AssignedBooleanAttribute {
			value
		}
	}
	variants {
		id
		selectionAttributes: attributes(variantSelection: VARIANT_SELECTION) {
			attribute {
				slug
				name
				inputType
				translation(languageCode: $languageCode) {
					name
				}
			}
			values {
				name
				slug
				value
				translation(languageCode: $languageCode) {
					name
				}
				file {
					url
				}
			}
		}
	}
}
