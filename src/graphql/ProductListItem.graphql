fragment ProductListItem on Product {
	id
	name
	slug
	created
	translation(languageCode: $languageCode) {
		name
	}
	pricing {
		priceRange {
			start {
				gross {
					amount
					currency
				}
			}
			stop {
				gross {
					amount
					currency
				}
			}
		}
		priceRangeUndiscounted {
			start {
				gross {
					amount
					currency
				}
			}
			stop {
				gross {
					amount
					currency
				}
			}
		}
	}
	category {
		id
		name
		slug
		translation(languageCode: $languageCode) {
			name
		}
	}
	thumbnail(size: 1024, format: WEBP) {
		url
		alt
	}
	variants {
		id
		selectionAttributes: attributes(variantSelection: VARIANT_SELECTION) {
			attribute {
				slug
				name
				inputType
				translation(languageCode: $languageCode) {
					name
				}
			}
			values {
				name
				value
				translation(languageCode: $languageCode) {
					name
				}
				file {
					url
				}
			}
		}
	}
}
