query ProductDetails(
	$slug: String!
	$channel: String!
	$languageCode: LanguageCodeEnum!
	$slugLanguageCode: LanguageCodeEnum
) {
	product(slug: $slug, channel: $channel, slugLanguageCode: $slugLanguageCode) {
		id
		name
		slug
		description
		seoTitle
		seoDescription
		translation(languageCode: $languageCode) {
			name
			description
			seoTitle
			seoDescription
			slug
		}
		thumbnail(size: 2048, format: WEBP) {
			url
			alt
		}
		media {
			url(size: 2048, format: WEBP)
			alt
			type
		}
		category {
			id
			name
			slug
			translation(languageCode: $languageCode) {
				name
				slug
			}
		}
		# Bestseller merchandising flag — fetch only the boolean by slug (new attribute API).
		# Slugs must match PRODUCT_FLAG_SLUGS in src/lib/catalog/product-flags.ts.
		bestseller: assignedAttribute(slug: "bestseller") {
			... on AssignedBooleanAttribute {
				value
			}
		}
		pulseBestseller: assignedAttribute(slug: "pulse-bestseller") {
			... on AssignedBooleanAttribute {
				value
			}
		}
		# Spec accordion / care copy still read the full (deprecated) attribute list.
		# TODO: migrate to `assignedAttributes` in a dedicated attribute-API sweep.
		attributes {
			values {
				name
				translation(languageCode: $languageCode) {
					name
				}
			}
			attribute {
				name
				slug
				translation(languageCode: $languageCode) {
					name
				}
			}
		}
		variants {
			...VariantDetails
		}
		pricing {
			priceRange {
				start {
					gross {
						amount
						currency
					}
				}
				stop {
					gross {
						amount
						currency
					}
				}
			}
		}
	}
}
